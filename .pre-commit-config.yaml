# =============================================================================
# ferrosa-hermes — Pre-commit Configuration
# =============================================================================
# Generated by /warp (manage-precommit templates)
# Stack: Python (plugin/, hooks/) + Bash (setup.sh)
# =============================================================================

default_install_hook_types:
  - pre-commit
  - pre-push
  - commit-msg

default_language_version:
  python: python3

repos:
  # ---------------------------------------------------------------------------
  # General hooks (always include)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-json
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: no-commit-to-branch
        args:
          - --pattern
          - '^(?!((ci|chore|docs|feature|fix|refactor|test)\/[a-zA-Z0-9\-]+)$).*'

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline", "--exclude-files", ".*\\.lock"]
        # Baseline records the documented ferrosa_user:ferrosa_user default dev
        # placeholders (also in README) as known non-secrets. Audit new findings
        # with: detect-secrets audit .secrets.baseline

  # ---------------------------------------------------------------------------
  # Python: plugin/ + hooks/
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
        files: \.py$
      - id: debug-statements
        files: \.py$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.2
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(plugin|hooks)/.*\.py$
      - id: ruff-format
        files: ^(plugin|hooks)/.*\.py$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-r, --skip=B101]
        files: ^(plugin|hooks)/.*\.py$

  # ---------------------------------------------------------------------------
  # Shell scripts (setup.sh + generated wrappers)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pecigonzalo/pre-commit-shfmt
    rev: v2.2.0
    hooks:
      - id: shell-fmt-docker
        name: shfmt
        args:
          - --indent=2
          - --binary-next-line
          - --case-indent
          - --space-redirects
        files: \.sh$
        exclude: ^\.claude/skills/

  # ---------------------------------------------------------------------------
  # Codespell (typo detection)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        exclude: '(\.lock$|\.claude/skills/|\.opencode/skills/|\.agents/skills/)'

  # ---------------------------------------------------------------------------
  # Commit message convention
  # ---------------------------------------------------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
